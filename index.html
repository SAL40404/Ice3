<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice³ Hub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem;
            display: flex;
            justify-content: space-around;
        }
        .tab {
            padding: 1rem;
            cursor: pointer;
        }
        .content {
            padding: 2rem;
        }
        .button {
            background-color: #1DB954;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #1ed760;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="tab">Home</div>
        <div class="tab">Projects</div>
    </div>
    <div class="content">
        <h1>Welcome to Ice³ Hub</h1>
        <p>Your go-to place for all things Ice³.</p>
        <h2>Download</h2>
        <button class="button">Download Ice³</button>
    </div>
    <script>
        const tabs = document.querySelectorAll('.tab');
        const content = document.querySelector('.content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                content.innerHTML = `<h1>${tab.textContent}</h1><p>Content for ${tab.textContent} page.</p>`;
            });
        });
    </script>
</body>
</html>
